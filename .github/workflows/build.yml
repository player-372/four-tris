name: Build Four-Tris (AutoIt)

on:
  workflow_dispatch: # Позволяет запускать сборку вручную по кнопке

jobs:
  build:
    runs-on: windows-latest # Используем настоящую Windows от GitHub
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AutoIt
        run: |
          # Скачиваем официальный установщик AutoIt
          Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
          # Устанавливаем его в тихом режиме
          Start-Process -FilePath "autoit-setup.exe" -ArgumentList "/S" -Wait

      - name: Compile AutoIt Script
        run: |
          # Находим главный .au3 файл в репозитории
          $au3File = (Get-ChildItem -Recurse -Filter *.au3 | Select-Object -First 1).FullName
          Write-Host "Found script: $au3File"
          
          # Путь к компилятору Aut2Exe (64-битная версия)
          $compiler = "C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe_x64.exe"
          $outputExe = Join-Path $env:GITHUB_WORKSPACE "four-tris-clean.exe"
          
          # Компиляция
          & $compiler /in "$au3File" /out "$outputExe" /x64
          Write-Host "Compilation successful: $outputExe"

      - name: Upload compiled executable
        uses: actions/upload-artifact@v4
        with:
          name: four-tris-clean-build
          path: four-tris-clean.exe
          retention-days: 7 # Файл будет храниться 7 дней
