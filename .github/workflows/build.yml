name: Build Four-Tris (Official Compiler)

on:
  workflow_dispatch: # Запуск вручную по кнопке

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: 1. Скачивание исходного кода (git clone)
        uses: actions/checkout@v4
        # Примечание: предупреждение о Node.js 20 здесь безвредно, это внутренняя особенность серверов GitHub, на сборку не влияет.

      - name: 2. Установка последней версии AutoIt3
        run: |
          Write-Host "Скачивание официального установщика AutoIt..."
          Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
          
          Write-Host "Тихая установка AutoIt..."
          Start-Process -FilePath "autoit-setup.exe" -ArgumentList "/S" -Wait
          
          Write-Host "Проверка установки компилятора..."
          $compilerPath = "C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe_x64.exe"
          if (Test-Path $compilerPath) {
              Write-Host "Компилятор успешно установлен по пути: $compilerPath"
          } else {
              Write-Error "Компилятор не найден!"
              exit 1
          }

      - name: 3. Подготовка и проверка файлов
        run: |
          Write-Host "Текущая директория: $(Get-Location)"
          Write-Host "Содержимое папки:"
          Get-ChildItem | Select-Object Name, Length
          
          $au3File = "Tetris.au3"
          $iconFile = "icon.ico"
          
          if (-not (Test-Path $au3File)) {
              Write-Error "Главный файл $au3File не найден! Сборка прервана."
              exit 1
          }
          Write-Host "Файл скрипта $au3File найден."

      - name: 4. Запуск AutoIt Compiler (Aut2Exe)
        run: |
          $au3File = "Tetris.au3"
          $iconFile = "icon.ico"
          $outputFile = "four-tris-clean-x64.exe"
          $compiler = "C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe_x64.exe"
          
          Write-Host "========================================="
          Write-Host "Начало компиляции через официальный Aut2Exe..."
          Write-Host "========================================="
          
          # Формируем аргументы командной строки для компилятора
          $args = "/in `"$au3File`" /out `"$outputFile`" /x64"
          
          # Если иконка существует, добавляем её, иначе компилируем без неё (это не влияет на безопасность)
          if (Test-Path $iconFile) {
              $args += " /icon `"$iconFile`""
              Write-Host "Добавлена иконка: $iconFile"
          } else {
              Write-Host "Иконка не найдена, компиляция без неё."
          }
          
          Write-Host "Выполняемая команда: $compiler $args"
          
          # Запускаем компилятор и перехватываем ВСЕ сообщения (и успех, и ошибки)
          $compileResult = & $compiler $args 2>&1
          
          # Выводим лог компилятора, чтобы вы видели, что произошло
          Write-Host $compileResult
          
          if ($LASTEXITCODE -ne 0) {
              Write-Error "Компилятор завершился с ошибкой (код: $LASTEXITCODE). См. лог выше."
              exit 1
          }
          
          if (Test-Path $outputFile) {
              $size = (Get-Item $outputFile).Length
              Write-Host "========================================="
              Write-Host "УСПЕХ! Файл успешно создан."
              Write-Host "Имя: $outputFile"
              Write-Host "Размер: $size байт"
              Write-Host "========================================="
          } else {
              Write-Error "Компилятор сообщил об успехе, но файл не создан."
              exit 1
          }

      - name: 5. Сохранение результата (Артефакт)
        uses: actions/upload-artifact@v4
        with:
          name: four-tris-clean-x64
          path: four-tris-clean-x64.exe
          retention-days: 7
