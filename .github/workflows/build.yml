name: Build Four-Tris (Latest Release)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: 1. Получение последнего релиза
        # Используем API GitHub чтобы найти последний стабильный релиз
        id: get_release
        run: |
          $response = Invoke-RestMethod -Uri "https://api.github.com/repos/fiorescarlatto/four-tris/releases/latest"
          $tagName = $response.tag_name
          Write-Host "Найден последний релиз: $tagName"
          echo "tag_name=$tagName" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: 2. Скачивание кода релиза (вместо master)
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.get_release.outputs.tag_name }}
          # Если тегов нет, используем последний коммит с работающим кодом
          # ref: "v1.5.2"  # <-- замените на актуальный тег из releases

      - name: 3. Установка AutoIt3
        run: |
          Write-Host "Скачивание AutoIt..."
          Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
          Start-Process -FilePath "autoit-setup.exe" -ArgumentList "/S" -Wait

      - name: 4. Компиляция релизной версии
        shell: cmd
        run: |
          echo =========================================
          echo Компиляция релизной версии...
          echo =========================================
          
          cd /d "%GITHUB_WORKSPACE%"
          
          set COMPILER="C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe.exe"
          set SCRIPT="%CD%\Tetris.au3"
          set OUTPUT="%CD%\four-tris-release.exe"
          
          echo Компиляция...
          %COMPILER% /in %SCRIPT% /out %OUTPUT%
          
          if %ERRORLEVEL% NEQ 0 (
              echo ОШИБКА компиляции: %ERRORLEVEL%
              exit /b %ERRORLEVEL%
          )
          
          echo УСПЕХ!
          dir "%CD%\four-tris-release.exe"

      - name: 5. Сохранение артефакта
        uses: actions/upload-artifact@v4
        with:
          name: four-tris-release
          path: four-tris-release.exe
          retention-days: 7
