name: Build Four-Tris (Clean Build)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install AutoIt3
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
        Start-Process -FilePath ".\autoit-setup.exe" -ArgumentList "/S" -Wait

    - name: Compile AutoIt Script (x64)
      shell: cmd
      run: |
        echo Compiling Tetris.au3...
        "C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe_x64.exe" /in "Tetris.au3" /out "four-tris.exe" /x64
        echo Compilation finished with code: %ERRORLEVEL%

    - name: Create distribution package
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path "dist" -Force
        Copy-Item "four-tris.exe" -Destination "dist\"
        
        # Копируем все необходимые папки, чтобы игра работала
        Copy-Item "textures" -Destination "dist\" -Recurse -ErrorAction SilentlyContinue
        Copy-Item "se" -Destination "dist\" -Recurse -ErrorAction SilentlyContinue
        Copy-Item "lib" -Destination "dist\" -Recurse -ErrorAction SilentlyContinue
        Copy-Item "ai" -Destination "dist\" -Recurse -ErrorAction SilentlyContinue
        Copy-Item "colors.ini", "settings.ini", "buttons.bmp", "icon.ico" -Destination "dist\" -ErrorAction SilentlyContinue

    - name: Upload Complete Package
      uses: actions/upload-artifact@v4
      with:
        name: four-tris-working-build
        path: dist/
        retention-days: 7
