name: Build Four-Tris (Final Attempt)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AutoIt
        run: |
          Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
          Start-Process -FilePath "autoit-setup.exe" -ArgumentList "/S" -Wait

      - name: Compile
        shell: pwsh
        run: |
          Set-Location $env:GITHUB_WORKSPACE
          
          # Пробуем 32-bit компилятор (более стабилен в CI)
          $compiler = "C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe.exe"
          
          # Запускаем с таймаутом и перехватом вывода
          $job = Start-Job -ScriptBlock {
            Set-Location $using:env:GITHUB_WORKSPACE
            & $using:compiler /in "Tetris.au3" /out "four-tris.exe" /ErrorStdOut 2>&1
          }
          
          # Ждем максимум 3 минуты
          $result = Wait-Job $job -Timeout 180
          
          if ($result) {
            Receive-Job $job
            Remove-Job $job
          } else {
            Write-Host "TIMEOUT: Компиляция заняла больше 3 минут. Останавливаем."
            Stop-Job $job
            Remove-Job $job
            exit 1
          }
          
          if (Test-Path "four-tris.exe") {
            Write-Host "SUCCESS: Файл создан"
          } else {
            Write-Host "ERROR: Файл не создан"
            exit 1
          }

      - name: Upload
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: four-tris
          path: four-tris.exe
