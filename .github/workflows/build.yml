name: Build Four-Tris (Minimal)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install AutoIt
        run: |
          Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
          Start-Process -FilePath "autoit-setup.exe" -ArgumentList "/S" -Wait

      - name: Compile
        shell: cmd
        run: |
          cd /d "%GITHUB_WORKSPACE%"
          "C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe_x64.exe" /in "Tetris.au3" /out "four-tris.exe" /x64 /ErrorStdOut

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: four-tris
          path: four-tris.exe
          retention-days: 7
