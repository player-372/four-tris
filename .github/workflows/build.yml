name: Build Four-Tris (With Diagnostics)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install AutoIt3
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
        Start-Process -FilePath ".\autoit-setup.exe" -ArgumentList "/S" -Wait

    - name: Copy Custom UDFs to AutoIt Include Folder
      shell: powershell
      run: |
        Copy-Item -Path "lib\*" -Destination "C:\Program Files (x86)\AutoIt3\Include\" -Force
        Copy-Item -Path "ai\*" -Destination "C:\Program Files (x86)\AutoIt3\Include\" -Force

    - name: Check Script for Errors (Au3Check)
      shell: cmd
      run: |
        echo Running Au3Check...
        "C:\Program Files (x86)\AutoIt3\Au3Check.exe" "Tetris.au3"
        echo Au3Check exit code: %ERRORLEVEL%

    - name: Compile AutoIt Script (x64)
      shell: cmd
      run: |
        "C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe_x64.exe" /in "Tetris.au3" /out "four-tris.exe" /x64

    - name: Create distribution package
      shell: powershell
      run: |
        New-Item -ItemType Directory -Path "dist" -Force
        Copy-Item "four-tris.exe" -Destination "dist\"
        Copy-Item "textures" -Destination "dist\" -Recurse
        Copy-Item "se" -Destination "dist\" -Recurse
        Copy-Item "lib" -Destination "dist\" -Recurse
        Copy-Item "ai" -Destination "dist\" -Recurse
        Copy-Item "colors.ini" -Destination "dist\"
        Copy-Item "settings.ini" -Destination "dist\"
        Copy-Item "buttons.bmp" -Destination "dist\"
        Copy-Item "icon.ico" -Destination "dist\"

    - name: Upload Complete Package
      uses: actions/upload-artifact@v4
      with:
        name: four-tris-with-diagnostics
        path: dist/
        retention-days: 7
