name: Build and Compile AutoIt Script

on:
  workflow_dispatch: # Позволяет запускать сборку вручную

jobs:
  build:
    runs-on: windows-latest

    steps:
    # 1. Скачивание исходного кода репозитория
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Скачивание и установка AutoIt в тихом режиме
    - name: Download and Install AutoIt3
      shell: powershell
      run: |
        Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
        Start-Process -FilePath ".\autoit-setup.exe" -ArgumentList "/S" -Wait

    # 3. Компиляция скрипта .au3 в .exe файл
    - name: Compile AutoIt Script
      shell: cmd
      run: |
        "C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe.exe" /in "Tetris.au3" /out "four-tris.exe"

    # 4. Сохранение скомпилированного файла как артефакт сборки
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Compiled-Executable
        path: four-tris.exe
