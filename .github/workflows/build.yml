name: Build Four-Tris (AutoIt)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AutoIt
        run: |
          Write-Host "Downloading AutoIt..."
          Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
          Write-Host "Installing AutoIt silently..."
          Start-Process -FilePath "autoit-setup.exe" -ArgumentList "/S" -Wait
          Write-Host "AutoIt installed successfully."

      - name: Compile with AutoIt3Wrapper
        run: |
          # Находим основной скрипт
          $au3File = (Get-ChildItem -Recurse -Filter "Tetris.au3" | Select-Object -First 1).FullName
          if (-not $au3File) {
            Write-Error "Tetris.au3 not found!"
            exit 1
          }
          Write-Host "Found script: $au3File"
          
          # Пути к инструментам AutoIt
          $autoItExe = "C:\Program Files (x86)\AutoIt3\AutoIt3.exe"
          $wrapperScript = "C:\Program Files (x86)\AutoIt3\SciTE\AutoIt3Wrapper\AutoIt3Wrapper.au3"
          
          # Запускаем официальный Wrapper в режиме production (/prod)
          # Он сам прочитает #AutoIt3Wrapper_Outfile_x64 и соберет всё как надо
          Write-Host "Starting compilation via AutoIt3Wrapper..."
          & $autoItExe $wrapperScript /in "$au3File" /prod
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Compilation failed with exit code: $LASTEXITCODE"
            exit 1
          }
          
          # Согласно директивам в коде, файл будет создан здесь:
          $expectedOutput = "build\current\four-tris-x64.exe"
          
          if (Test-Path $expectedOutput) {
            Write-Host "Compilation successful!"
            Write-Host "Output file size: $((Get-Item $expectedOutput).Length) bytes"
            
            # Копируем файл в корень репозитория для удобной загрузки артефакта
            Copy-Item -Path $expectedOutput -Destination "four-tris-clean-x64.exe"
          } else {
            Write-Error "Compilation finished, but output file was not found at: $expectedOutput"
            # Выведем список файлов в папке build для отладки, если что-то пошло не так
            Get-ChildItem -Path "build" -Recurse -ErrorAction SilentlyContinue
            exit 1
          }

      - name: Upload compiled executable
        uses: actions/upload-artifact@v4
        with:
          name: four-tris-clean-x64
          path: four-tris-clean-x64.exe
          retention-days: 7
