name: Build Four-Tris (Stable CMD Build)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: 1. Скачивание исходного кода
        uses: actions/checkout@v4

      - name: 2. Установка AutoIt3
        run: |
          Write-Host "Скачивание и установка AutoIt..."
          Invoke-WebRequest -Uri "https://www.autoitscript.com/cgi-bin/getfile.pl?autoit3/autoit-v3-setup.exe" -OutFile "autoit-setup.exe"
          Start-Process -FilePath "autoit-setup.exe" -ArgumentList "/S" -Wait
          Write-Host "Установка завершена."

      - name: 3. Компиляция через Aut2Exe (CMD режим)
        # Явно указываем использовать классический cmd.exe вместо PowerShell для максимальной совместимости
        shell: cmd
        run: |
          echo =========================================
          echo Начало компиляции в стабильном режиме...
          echo =========================================
          
          REM Переходим в директорию репозитория (на всякий случай)
          cd /d "%GITHUB_WORKSPACE%"
          
          REM Используем базовый компилятор. Он стабильнее работает в CI-средах, 
          чем x64-версия, и создаст exe, который отлично работает на вашей 64-битной Windows.
          set COMPILER="C:\Program Files (x86)\AutoIt3\Aut2Exe\Aut2Exe.exe"
          
          REM Используем абсолютные пути, чтобы компилятор точно нашел файл
          set SCRIPT="%CD%\Tetris.au3"
          set OUTPUT="%CD%\four-tris-clean.exe"
          
          echo Компилятор: %COMPILER%
          echo Скрипт: %SCRIPT%
          echo Результат: %OUTPUT%
          echo.
          
          REM Запускаем компиляцию БЕЗ параметра /icon (он часто вызывает молчаливые краши в CI)
          %COMPILER% /in %SCRIPT% /out %OUTPUT%
          
          REM Проверяем код завершения
          if %ERRORLEVEL% NEQ 0 (
              echo.
              echo =========================================
              echo ОШИБКА: Компиляция завершилась с кодом %ERRORLEVEL%
              echo =========================================
              exit /b %ERRORLEVEL%
          )
          
          echo.
          echo =========================================
          echo УСПЕХ! Файл успешно создан.
          echo Проверка наличия файла:
          dir "%CD%\four-tris-clean.exe"
          echo =========================================

      - name: 4. Сохранение результата (Артефакт)
        uses: actions/upload-artifact@v4
        with:
          name: four-tris-clean
          path: four-tris-clean.exe
          retention-days: 7
